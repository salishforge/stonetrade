name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: stonetrade
          POSTGRES_PASSWORD: stonetrade
          POSTGRES_DB: stonetrade_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U stonetrade"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://stonetrade:stonetrade@localhost:5432/stonetrade_test
      TEST_DATABASE_URL: postgresql://stonetrade:stonetrade@localhost:5432/stonetrade_test
      STRIPE_WEBHOOK_SECRET: whsec_ci_placeholder
      AUTH_MODE: mock

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npx prisma generate

      - run: npx prisma migrate deploy

      - run: npx tsc --noEmit

      - run: npm run lint

      - run: npm test
